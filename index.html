<!DOCTYPE html><html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Streak</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      color-scheme: light;
    }* {
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
  background-color: #ffffff;
  background-image:
    linear-gradient(rgba(15, 23, 42, 0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(15, 23, 42, 0.035) 1px, transparent 1px),
    radial-gradient(circle at top, rgba(59, 130, 246, 0.06), transparent 28%);
  background-size: 28px 28px, 28px 28px, auto;
  overflow-x: hidden;
}

.month-title {
  letter-spacing: -0.04em;
}

.day-pill {
  transition: transform 180ms ease, box-shadow 240ms ease, background-color 240ms ease, border-color 240ms ease, color 240ms ease;
  will-change: transform;
}

.day-pill:hover {
  transform: translateY(-1px);
}

.day-pill.done {
  background: linear-gradient(180deg, #4ade80 0%, #22c55e 100%);
  color: white;
  box-shadow: 0 12px 24px rgba(34, 197, 94, 0.22);
  border-color: rgba(34, 197, 94, 0.15);
}

.day-pill.today {
  border-color: rgba(15, 23, 42, 0.12);
  box-shadow: 0 0 0 4px rgba(15, 23, 42, 0.03);
}

.day-pill.done-pop {
  animation: dayPop 560ms cubic-bezier(.2,.9,.2,1);
}

.streak-pop {
  animation: streakPop 720ms cubic-bezier(.2,.9,.2,1);
}

.flame-bounce {
  animation: flameBounce 1100ms cubic-bezier(.2,.9,.2,1);
  transform-origin: center bottom;
}

.float-plus {
  animation: floatPlus 950ms cubic-bezier(.2,.9,.2,1) forwards;
}

.soft-ring {
  animation: softRing 900ms ease-out forwards;
}

.confetti-piece {
  position: absolute;
  width: 8px;
  height: 14px;
  border-radius: 999px;
  opacity: 0;
  animation: confettiBurst 1200ms cubic-bezier(.15,.85,.2,1) forwards;
  will-change: transform, opacity;
}

@keyframes dayPop {
  0% { transform: scale(0.84); }
  45% { transform: scale(1.12); }
  70% { transform: scale(0.97); }
  100% { transform: scale(1); }
}

@keyframes streakPop {
  0% { transform: scale(0.92); }
  38% { transform: scale(1.12); }
  68% { transform: scale(0.98); }
  100% { transform: scale(1); }
}

@keyframes flameBounce {
  0% { transform: translateY(0) scale(1) rotate(0deg); }
  20% { transform: translateY(-2px) scale(1.06) rotate(-3deg); }
  42% { transform: translateY(0) scale(0.96) rotate(2deg); }
  64% { transform: translateY(-1px) scale(1.04) rotate(-1deg); }
  100% { transform: translateY(0) scale(1) rotate(0deg); }
}

@keyframes floatPlus {
  0% { transform: translateY(10px) scale(0.92); opacity: 0; }
  18% { opacity: 1; }
  100% { transform: translateY(-22px) scale(1); opacity: 0; }
}

@keyframes softRing {
  0% { transform: scale(0.88); opacity: 0.42; }
  100% { transform: scale(1.45); opacity: 0; }
}

@keyframes confettiBurst {
  0% {
    transform: translate(0, 0) rotate(0deg) scale(0.7);
    opacity: 0;
  }
  16% {
    opacity: 1;
  }
  100% {
    transform: translate(var(--x), var(--y)) rotate(var(--r)) scale(1.08);
    opacity: 0;
  }
}

@media (prefers-reduced-motion: reduce) {
  .day-pill,
  .streak-pop,
  .flame-bounce,
  .float-plus,
  .soft-ring,
  .confetti-piece,
  .day-pill.done-pop {
    animation: none !important;
    transition: none !important;
  }
}

  </style>
</head>
<body class="min-h-screen text-slate-900 selection:bg-emerald-200/70">
  <main class="mx-auto flex min-h-screen max-w-5xl flex-col items-center justify-center px-5 py-8 sm:px-8 sm:py-10">
    <section class="flex w-full max-w-3xl flex-col items-center">
      <div class="relative flex flex-col items-center">
        <div id="ringEffect" class="pointer-events-none absolute inset-0 hidden items-center justify-center">
          <div class="soft-ring h-28 w-28 rounded-full border border-emerald-300/60"></div>
        </div><div class="relative flex h-20 w-20 items-center justify-center rounded-full bg-gradient-to-b from-orange-50 to-white shadow-[0_14px_40px_rgba(249,115,22,0.12)] sm:h-24 sm:w-24">
      <span id="flameIcon" class="text-4xl sm:text-5xl">🔥</span>
      <span id="plusOne" class="pointer-events-none absolute top-1/2 hidden -translate-y-1/2 text-lg font-semibold text-emerald-500 sm:text-xl">+1</span>
    </div>

    <div id="streakWrap" class="mt-4 text-center">
      <div id="streakValue" class="text-5xl font-semibold leading-none tracking-[-0.06em] text-slate-900 sm:text-6xl">0</div>
      <div class="mt-2 text-sm text-slate-400">días de racha</div>
    </div>
  </div>

  <div class="mt-10 w-full rounded-[2.2rem] border border-slate-200/70 bg-white/78 px-4 py-5 shadow-[0_24px_70px_rgba(15,23,42,0.07)] backdrop-blur-xl sm:px-7 sm:py-7">
    <div class="mb-6 text-center">
      <h1 id="monthLabel" class="month-title text-3xl font-semibold text-slate-900 sm:text-4xl">Mes</h1>
    </div>

    <div class="mb-4 grid grid-cols-7 gap-y-3 text-center text-[11px] font-medium uppercase tracking-[0.2em] text-slate-300 sm:text-xs">
      <div>L</div>
      <div>M</div>
      <div>M</div>
      <div>J</div>
      <div>V</div>
      <div>S</div>
      <div>D</div>
    </div>

    <div id="calendarGrid" class="grid grid-cols-7 gap-x-2 gap-y-3 sm:gap-x-3 sm:gap-y-4"></div>
  </div>

  <div class="mt-8 flex w-full max-w-xl justify-center">
    <button id="markYesterdayBtn" class="group flex w-full items-center justify-center rounded-[1.8rem] bg-slate-900 px-6 py-5 text-base font-semibold text-white shadow-[0_22px_45px_rgba(15,23,42,0.18)] transition duration-200 hover:scale-[1.01] active:scale-[0.985] sm:text-lg">
      Marcar hábito de ayer
    </button>
  </div>
</section>

  </main>  <script>
    const monthLabel = document.getElementById('monthLabel');
    const calendarGrid = document.getElementById('calendarGrid');
    const streakValue = document.getElementById('streakValue');
    const streakWrap = document.getElementById('streakWrap');
    const flameIcon = document.getElementById('flameIcon');
    const plusOne = document.getElementById('plusOne');
    const ringEffect = document.getElementById('ringEffect');
    const markYesterdayBtn = document.getElementById('markYesterdayBtn');

    const today = new Date();
    const viewedMonth = new Date(today.getFullYear(), today.getMonth(), 1);
    const storageKey = 'habit-streak-calendar-v3';
    let state = loadState();

    function loadState() {
      const raw = localStorage.getItem(storageKey);
      if (raw) {
        try {
          return JSON.parse(raw);
        } catch {}
      }
      return { completedDates: [] };
    }

    function saveState() {
      localStorage.setItem(storageKey, JSON.stringify(state));
    }

    function formatKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function getYesterday(base = today) {
      const d = new Date(base);
      d.setDate(d.getDate() - 1);
      return d;
    }

    function isSameDay(a, b) {
      return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
    }

    function getCompletedSet() {
      return new Set(state.completedDates);
    }

    function capitalize(text) {
      return text.charAt(0).toUpperCase() + text.slice(1);
    }

    function computeStreak() {
      const set = getCompletedSet();
      let streak = 0;
      const cursor = getYesterday(today);

      while (set.has(formatKey(cursor))) {
        streak += 1;
        cursor.setDate(cursor.getDate() - 1);
      }

      return streak;
    }

    function renderCalendar() {
      calendarGrid.innerHTML = '';
      const year = viewedMonth.getFullYear();
      const month = viewedMonth.getMonth();
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const daysInMonth = lastDay.getDate();
      const completedSet = getCompletedSet();
      const yesterday = getYesterday(today);

      monthLabel.textContent = capitalize(
        viewedMonth.toLocaleDateString('es-AR', { month: 'long', year: 'numeric' })
      );

      let startOffset = firstDay.getDay();
      startOffset = startOffset === 0 ? 6 : startOffset - 1;

      for (let i = 0; i < startOffset; i++) {
        const filler = document.createElement('div');
        filler.className = 'flex items-center justify-center';
        const spacer = document.createElement('div');
        spacer.className = 'h-10 w-10 rounded-full sm:h-12 sm:w-12';
        filler.appendChild(spacer);
        calendarGrid.appendChild(filler);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const cellDate = new Date(year, month, day);
        const key = formatKey(cellDate);
        const isDone = completedSet.has(key);
        const isToday = isSameDay(cellDate, today);
        const isYesterday = isSameDay(cellDate, yesterday);
        const isFuture = cellDate > new Date(today.getFullYear(), today.getMonth(), today.getDate());

        const wrap = document.createElement('div');
        wrap.className = 'flex items-center justify-center';

        const pill = document.createElement('div');
        pill.dataset.date = key;
        pill.className = [
          'day-pill',
          'flex',
          'h-10',
          'w-10',
          'items-center',
          'justify-center',
          'rounded-full',
          'border',
          'text-sm',
          'font-medium',
          'sm:h-12',
          'sm:w-12',
          'sm:text-base',
          isDone ? 'done' : 'border-slate-200 bg-white text-slate-700',
          isToday ? 'today' : '',
          isFuture ? 'opacity-35' : ''
        ].join(' ');

        pill.textContent = day;

        if (!isDone && isYesterday) {
          pill.classList.add('text-slate-900');
        }

        wrap.appendChild(pill);
        calendarGrid.appendChild(wrap);
      }
    }

    function updateStreak() {
      streakValue.textContent = computeStreak();
    }

    function triggerCelebration(targetKey) {
      streakWrap.classList.remove('streak-pop');
      flameIcon.classList.remove('flame-bounce');
      void streakWrap.offsetWidth;
      streakWrap.classList.add('streak-pop');
      flameIcon.classList.add('flame-bounce');

      ringEffect.classList.remove('hidden');
      ringEffect.classList.add('flex');
      setTimeout(() => {
        ringEffect.classList.add('hidden');
        ringEffect.classList.remove('flex');
      }, 900);

      plusOne.classList.remove('hidden');
      plusOne.classList.add('float-plus');
      setTimeout(() => {
        plusOne.classList.add('hidden');
        plusOne.classList.remove('float-plus');
      }, 950);

      const target = document.querySelector(`[data-date="${targetKey}"]`);
      if (target) {
        target.classList.add('done-pop');
        setTimeout(() => target.classList.remove('done-pop'), 560);
      }

      const colors = ['#86efac', '#4ade80', '#22c55e', '#bbf7d0', '#dcfce7'];
      const pieces = 16;

      for (let i = 0; i < pieces; i++) {
        const piece = document.createElement('span');
        piece.className = 'confetti-piece';
        const angle = (Math.PI * 2 * i) / pieces;
        const distance = 48 + Math.random() * 72;
        const x = Math.cos(angle) * distance;
        const y = Math.sin(angle) * distance - 30;
        piece.style.setProperty('--x', `${x}px`);
        piece.style.setProperty('--y', `${y}px`);
        piece.style.setProperty('--r', `${Math.random() * 520 - 260}deg`);
        piece.style.background = colors[i % colors.length];
        piece.style.left = '50%';
        piece.style.top = '50%';
        streakWrap.appendChild(piece);
        setTimeout(() => piece.remove(), 1300);
      }

      if ('vibrate' in navigator) {
        navigator.vibrate(22);
      }
    }

    function markYesterdayDone() {
      const yesterday = getYesterday(today);
      const key = formatKey(yesterday);

      if (!state.completedDates.includes(key)) {
        state.completedDates.push(key);
        state.completedDates.sort();
        saveState();
        renderCalendar();
        updateStreak();
        triggerCelebration(key);
      } else {
        markYesterdayBtn.animate([
          { transform: 'scale(1)' },
          { transform: 'scale(0.985)' },
          { transform: 'scale(1.01)' },
          { transform: 'scale(1)' }
        ], { duration: 260, easing: 'ease-out' });
        if ('vibrate' in navigator) {
          navigator.vibrate(12);
        }
      }
    }

    markYesterdayBtn.addEventListener('click', markYesterdayDone);

    renderCalendar();
    updateStreak();
  </script></body>
</html>
